services:
  ghidra:
    build: .
    container_name: ghidra
    ports:
      - 13100:13100
      - 13101:13101
      - 13102:13102
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '2.0'
          memory: 4G
    volumes:
      - ./ws:/ghidra