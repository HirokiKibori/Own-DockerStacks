version: '3'

services:
  openplc-runtime:
    image: ghcr.io/autonomy-logic/openplc-runtime:latest
    cap_add:
      - SYS_NICE
      - SYS_RESOURCE
    ports:
      - 127.0.0.1:8443:8443/tcp
    networks:
      - public-test-network
    volumes:
      - ./data:/var/run/runtime

networks:
  public-test-network:
    external: true
